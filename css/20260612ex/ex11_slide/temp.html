<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POSITION</title>

    <style>
        div {
            width: 300px;
            height: 100px;
            text-align: center;
        }

        div.redbox {
            background-color: red;
            position: fixed;
            top: 0;
            left: 0;
        }

        div.greenbox {
            background-color: green;
            position: relative;
            top: 50px;
            left: 100px;
        }

        div.bludbox {
            background-color: blue;
            position: absolute;
            top: 500px;
            left: 700px;
        }
    </style>

</head>
<body>
    
    <div class="redbox">첫 번째 요소</div>
    <div class="greenbox">두 번째 요소</div>
    <div class="bludbox">세 번째 요소</div>

</html>
